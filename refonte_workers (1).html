<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workers - Select Account Type</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            light: '#fadada', // Light pink for shapes
                            DEFAULT: '#de6b6b', // Main red/coral color
                            dark: '#c45a5a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom styles for radio card selection */
        .card-input:checked + .card-content {
            border-color: #de6b6b;
            background-color: #fffafb;
            box-shadow: 0 10px 25px -5px rgba(222, 107, 107, 0.15), 0 8px 10px -6px rgba(222, 107, 107, 0.1);
        }
        .card-input:checked + .card-content .icon-container {
            color: #de6b6b;
        }
    </style>
</head>
<body class="bg-white text-slate-800 font-sans min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- Background Decorative Shapes -->
    <div class="absolute bottom-0 left-1/2 w-full max-w-6xl h-full overflow-hidden pointer-events-none -translate-x-1/2 z-0">
        <!-- Lightest circle -->
        <div class="absolute -bottom-[40%] right-[15%] w-[900px] h-[900px] bg-[#fdf2f2] rounded-[100%]"></div>
        <!-- Darker circle overlapping -->
        <div class="absolute -bottom-[35%] right-[-5%] w-[700px] h-[700px] bg-brand-light rounded-[100%] opacity-80"></div>
    </div>

    <!-- Header -->
    <header class="flex justify-between items-center px-6 py-4 border-b border-gray-100 bg-white/80 backdrop-blur-md z-10 sticky top-0">
        <!-- Logo -->
        <div class="flex items-center space-x-1 cursor-pointer">
            <span class="text-3xl font-extrabold tracking-tight text-slate-900">w</span>
            <!-- Custom 'o' logo mark -->
            <div class="relative w-5 h-5 mt-1 flex items-center justify-center">
                <div class="absolute w-full h-full bg-slate-900 rounded-sm rotate-45 opacity-80"></div>
                <div class="absolute w-full h-full bg-brand rounded-full mix-blend-multiply"></div>
            </div>
            <span class="text-3xl font-extrabold tracking-tight text-slate-900">rkers</span>
        </div>

        <!-- Language Selector -->
        <button class="flex items-center space-x-2 bg-gray-50 hover:bg-gray-100 text-slate-600 px-4 py-2 rounded-lg font-medium transition-colors border border-gray-200">
            <span>EN</span>
            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center px-6 pt-8 pb-24 z-10 relative">
        
        <!-- Progress Indicator -->
        <div class="w-full max-w-4xl mb-12">
            <div class="flex items-center space-x-3 mb-1">
                <i data-lucide="person-standing" class="w-8 h-8 text-slate-800 -ml-1"></i>
                <div class="flex items-center space-x-2 text-slate-700 font-bold text-sm bg-white/50 backdrop-blur-sm px-2 py-1 rounded-md">
                    <i data-lucide="monitor" class="w-4 h-4 text-slate-500"></i>
                    <span>Company / Digital</span>
                </div>
            </div>
            <div class="text-sm font-bold text-slate-800 mb-2">Warmup</div>
            <div class="flex items-center space-x-3 w-full">
                <!-- Active long line -->
                <div class="h-2 w-1/2 bg-gray-200 rounded-full overflow-hidden">
                    <div class="w-full h-full bg-gray-300"></div>
                </div>
                <!-- Inactive short lines -->
                <div class="h-1.5 w-16 bg-gray-100 rounded-full"></div>
                <div class="h-1.5 w-16 bg-gray-100 rounded-full"></div>
                <div class="h-1.5 w-16 bg-gray-100 rounded-full"></div>
            </div>
        </div>

        <!-- Selection Cards Wrapper -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl mt-2">
            
            <!-- Card 1: AI Import -->
            <div class="relative rounded-[12px] bg-gradient-to-r from-[#9b51e0] to-[#f65599] p-[2px] shadow-sm transition-transform hover:-translate-y-1">
                <!-- Star Decorations -->
                <div class="absolute -top-6 -right-6 w-16 h-16 z-10 pointer-events-none drop-shadow-md">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#9b51e0" />
                                <stop offset="100%" stop-color="#f65599" />
                            </linearGradient>
                        </defs>
                        <path d="M50 15 C50 35, 65 50, 85 50 C65 50, 50 65, 50 85 C50 65, 35 50, 15 50 C35 50, 50 35, 50 15" fill="url(#starGrad)" />
                        <path d="M85 25 C85 32, 88 35, 95 35 C88 35, 85 38, 85 45 C85 38, 82 35, 75 35 C82 35, 85 32, 85 25" fill="#fbcfe8" />
                    </svg>
                </div>

                <div class="bg-white rounded-[10px] h-full flex flex-col items-center justify-center p-10 text-center relative overflow-hidden">
                    <h2 class="text-[22px] md:text-[24px] font-bold text-slate-800 mb-6 max-w-[300px] leading-snug">Go 3 times faster with AI<br>by importing your job offer</h2>
                    <button class="bg-gradient-to-r from-[#d9468e] to-[#ee7788] text-white font-semibold py-3 px-6 rounded-lg flex items-center space-x-2 hover:shadow-lg hover:opacity-95 transition-all">
                        <i data-lucide="file-text" class="w-5 h-5"></i>
                        <span>I import my job offer</span>
                    </button>
                </div>
            </div>

            <!-- Card 2: Manual Create -->
            <div class="bg-white border border-gray-200 rounded-[12px] flex flex-col items-center justify-center p-10 text-center shadow-sm transition-all hover:shadow-md hover:border-gray-300">
                <h2 class="text-xl md:text-[22px] font-bold text-slate-800 mb-2">You don't have a job offer?</h2>
                <p class="text-slate-600 font-medium mb-6">Create it now</p>
                <button class="bg-white border border-gray-300 text-slate-700 font-semibold py-3 px-6 rounded-lg flex items-center space-x-2 hover:bg-gray-50 transition-colors">
                    <span>I complete my job offer</span>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400"></i>
                </button>
            </div>

        </div>

        <!-- Back Button -->
        <div class="w-full max-w-4xl mt-8 flex justify-start">
            <button class="flex items-center space-x-1 px-4 py-2 border border-gray-200 rounded-lg text-slate-600 font-medium hover:bg-gray-50 transition-colors shadow-sm bg-white text-sm">
                <i data-lucide="chevron-left" class="w-4 h-4"></i>
                <span>Back</span>
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="flex flex-col md:flex-row justify-between items-center px-8 py-6 border-t border-gray-200 bg-white z-10">
        <!-- Footer Logo -->
        <div class="flex items-center space-x-1 mb-4 md:mb-0 opacity-80">
            <span class="text-xl font-extrabold tracking-tight text-slate-900">w</span>
            <div class="relative w-3.5 h-3.5 mt-0.5 flex items-center justify-center">
                <div class="absolute w-full h-full bg-slate-900 rounded-sm rotate-45 opacity-80"></div>
                <div class="absolute w-full h-full bg-brand rounded-full mix-blend-multiply"></div>
            </div>
            <span class="text-xl font-extrabold tracking-tight text-slate-900">rkers</span>
        </div>

        <!-- Copyright -->
        <div class="text-slate-500 text-sm font-medium mb-4 md:mb-0">
            © Workers.be 2026
        </div>

        <!-- Terms -->
        <a href="#" class="text-slate-600 hover:text-slate-900 text-sm font-medium transition-colors">
            Terms and Conditions
        </a>
    </footer>

    <!-- Floating Action Button -->
    <button class="fixed bottom-6 right-6 md:bottom-10 md:right-10 bg-[#de6b6b] hover:bg-[#c45a5a] text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg shadow-brand/30 transition-transform duration-300 hover:scale-110 z-50 group">
        <i data-lucide="send" class="w-6 h-6 ml-1 group-hover:animate-pulse"></i>
    </button>

    <!-- Initialize Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
